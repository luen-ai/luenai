<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#111;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#1c1f26;
padding:40px;
border-radius:10px;
width:320px;
}

h2{
color:white;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
background:#2a2f38;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#4f46e5;
color:white;
cursor:pointer;
}

#error{
color:#ff4d4d;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input id="email" type="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="error"></div>

</div>

<script>

const SUPABASE_URL = "https://bbpythvxxjmagpnrxqxx.supabase.co"
const SUPABASE_ANON_KEY = "여기에_anon_public_key"

const supabaseClient = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
)

async function adminLogin(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabaseClient
.from("admin")
.select("*")
.eq("email", email)
.eq("password", password)
.single()

if(error || !data){
document.getElementById("error").innerText = "로그인 실패"
return
}

localStorage.setItem("admin", "true")

location.href = "admin-dashboard.html"

}

</script>

</body>
</html>

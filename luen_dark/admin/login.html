<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUEN Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#020617,#020617,#0f172a,#111827);
font-family:Arial;
color:white;
}

.login-box{
width:340px;
padding:40px;
background:rgba(15,23,42,0.85);
border-radius:10px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#error{
margin-top:10px;
color:#f87171;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>LUEN 관리자 로그인</h2>

<input id="admin_id" placeholder="아이디">
<input id="admin_pw" type="password" placeholder="비밀번호">

<button onclick="adminLogin()">로그인</button>

<div id="error"></div>

</div>


<script>

const SUPABASE_URL = "https://bbpythvxxjmagpnrxqxx.supabase.co"
const SUPABASE_KEY = "YOUR_PUBLIC_ANON_KEY"

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function adminLogin(){

const id = document.getElementById("admin_id").value
const pw = document.getElementById("admin_pw").value
const errorBox = document.getElementById("error")

errorBox.innerText=""

const { data , error } = await supabase
.from("users")
.select("*")
.eq("username",id)
.eq("status","active")
.single()

if(error || !data){

errorBox.innerText="관리자 계정을 찾을 수 없습니다."
return

}

if(pw !== data.password_hash){

errorBox.innerText="비밀번호가 올바르지 않습니다."
return

}

localStorage.setItem("luen_admin",JSON.stringify(data))

window.location.href="admin_dashboard.html"

}

</script>

</body>
</html>

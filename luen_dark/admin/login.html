<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#0f1115;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:#1a1d24;
    padding:40px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.login-box h2{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
    background:#2a2f3a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#4338ca;
}

#error{
    color:#ff4d4d;
    margin-top:10px;
    font-size:14px;
    text-align:center;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="error"></div>
</div>

<script>

const SUPABASE_URL = "https://bbpythvxxjmagpnrxqxx.supabase.co"
const SUPABASE_ANON_KEY = "여기에_anon_public_key"

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
)

async function adminLogin(){

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    })

    if(error){
        document.getElementById("error").innerText = error.message
        return
    }

    location.href = "admin-dashboard.html"
}

</script>

</body>
</html>
